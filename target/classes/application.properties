# 서버 포트 (기본 8080)
server.port=${PORT:8080}

# [PostgreSQL DB 접속 설정] - 수정됨
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://${PGHOST:maglev.proxy.rlwy.net}:${PGPORT:29234}/${PGDATABASE:railway}
spring.datasource.username=${PGUSER:postgres}
spring.datasource.password=${PGPASSWORD:wfkgIOhGvcmqAqamLtOqjNghLONVRsHU}

# [HikariCP Connection Pool]
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000

# MyBatis Mapper XML 위치 설정
mybatis.mapper-locations=classpath:mappers/**/*.xml

# DB에서 가져온 컬럼명(SNAKE_CASE)을 자바 변수명(camelCase)으로 자동 매핑
mybatis.configuration.map-underscore-to-camel-case=true

# [Logging - Debug 모드]
logging.level.com.kdh.todo.mapper=debug
logging.level.org.mybatis=debug

# [Character Encoding]
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true