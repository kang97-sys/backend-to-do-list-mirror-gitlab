# 서버 포트 (기본 8080)
server.port=${PORT:8080}

# Oracle DB 접속 설정
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver
spring.datasource.url=${JDBC_URL:jdbc:oracle:thin:@interchange.proxy.rlwy.net:50958/FREE}
spring.datasource.username=${DB_USER:KDH}
spring.datasource.password=${DB_PASSWORD:1234}

# [HikariCP Connection Pool ]
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000

# MyBatis Mapper XML 위치 설정
mybatis.mapper-locations=classpath:mappers/**/*.xml

# DB에서 가져온 컬럼명(SNAKE_CASE)을 자바 변수명(camelCase)으로 자동 매핑
# 예: REG_DATE 컬럼을 regDate 변수에 자동으로 넣어줌
mybatis.configuration.map-underscore-to-camel-case=true

# [Logging - Debug 모드]
# 실행되는 SQL 쿼리와 파라미터를 콘솔에서 바로 확인합니다.
logging.level.com.kdh.todo.mapper=debug
logging.level.org.mybatis=debug

# [Character Encoding]
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true